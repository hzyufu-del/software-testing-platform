{% extends "base.html" %}

{% block title %}用户注册 - 软件测试平台{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-intro register-intro">
            <span class="auth-icon">ST</span>
            <span class="eyebrow">CREATE ACCOUNT</span>
            <h1>创建新账号</h1>
            <p>加入平台，从软件测试基础知识开始，逐步完成练习与实训。</p>
            <div class="auth-points">
                <span>知识学习</span>
                <span>能力训练</span>
                <span>实践提升</span>
            </div>
        </div>
        <div class="auth-form-panel">
            <div class="auth-form-heading">
                <span>账户注册</span>
                <h2>用户注册</h2>
                <p>填写信息创建你的学习账号</p>
            </div>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                           required maxlength="80" autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password"
                           required minlength="6" autocomplete="new-password" placeholder="请输入密码（至少6位）">
                </div>
                <div class="mb-4">
                    <label for="confirm" class="form-label">确认密码</label>
                    <input type="password" class="form-control form-control-lg" id="confirm" name="confirm"
                           required minlength="6" autocomplete="new-password" placeholder="请再次输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 auth-submit">注册</button>
            </form>
            <p class="auth-switch">
                已有账号？<a href="{{ url_for('auth.login') }}">返回登录</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
