{% extends "base.html" %}

{% block title %}用户登录 - 软件测试平台{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-intro">
            <span class="auth-icon">ST</span>
            <span class="eyebrow">WELCOME BACK</span>
            <h1>欢迎回来</h1>
            <p>登录软件测试学习与接口测试实训平台，继续你的学习与实践。</p>
            <div class="auth-points">
                <span>课程学习</span>
                <span>题库练习</span>
                <span>接口实训</span>
            </div>
        </div>
        <div class="auth-form-panel">
            <div class="auth-form-heading">
                <span>账户登录</span>
                <h2>用户登录</h2>
                <p>请输入你的用户名和密码</p>
            </div>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                           required maxlength="80" autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password"
                           required autocomplete="current-password" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 auth-submit">登录</button>
            </form>
            <p class="auth-switch">
                还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
